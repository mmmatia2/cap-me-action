<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cap Me Action Recorder</title>
    <link rel="stylesheet" href="../shared-ui/tokens.css" />
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        width: 336px;
        max-height: 600px;
        overflow: hidden;
        font-family: var(--font-sans);
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78) 0%, rgba(237, 242, 247, 0.92) 100%),
          linear-gradient(135deg, rgba(36, 89, 155, 0.08) 0%, transparent 42%);
        font-size: 14px;
      }

      .popup {
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: 600px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
      }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, #f9fbfd 0%, #e9eef5 100%);
        color: var(--accent-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.08em;
        flex-shrink: 0;
        box-shadow: var(--shadow-sm);
      }

      .title-container {
        flex: 1;
      }

      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      .subtitle {
        margin: 4px 0 0 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      .main-content {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        flex: 1 1 auto;
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .capture-btn {
        width: 100%;
        padding: 16px;
        border: 1px solid var(--accent);
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
        transition: background-color 0.2s ease, transform 0.2s ease;
        box-shadow: var(--shadow-sm);
      }

      .capture-btn:hover {
        background: linear-gradient(180deg, var(--accent-strong) 0%, #133a66 100%);
      }

      .capture-icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .capture-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: white;
      }

      .capture-dot.recording {
        border-radius: 3px;
        background: #fca5a5;
      }

      .status-text {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.88);
        margin: 0;
        line-height: 1.4;
      }

      .actions-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .action-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        text-decoration: none;
        box-shadow: var(--shadow-sm);
      }

      .action-btn:hover {
        border-color: var(--border-strong);
        background: var(--surface-2);
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 4px 0 0;
      }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0;
      }

      .view-all {
        background: none;
        border: none;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 0;
      }

      .recent-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        overflow: visible;
      }

      .recent-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.2s ease, background-color 0.2s ease;
      }

      .recent-item:hover {
        border-color: var(--border-strong);
        background: var(--surface-2);
      }

      .recent-thumb {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface-3);
        background-size: cover;
        background-position: center;
        flex-shrink: 0;
      }

      .recent-details {
        flex: 1;
        min-width: 0;
      }

      .recent-title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .recent-meta {
        margin: 2px 0 0;
        font-size: 11px;
        color: var(--muted);
      }

      .empty-state,
      .empty {
        padding: 20px 14px;
        text-align: center;
        background: var(--surface-2);
        border: 1px dashed var(--border);
        border-radius: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        margin: 0;
      }

      .footer {
        padding: 12px 18px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.76);
        flex-shrink: 0;
      }

      .footer-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 0;
      }

      .footer-btn:hover {
        color: var(--text);
      }

      .footer-note {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .keyboard-hints {
        display: flex;
        gap: 4px;
        margin-top: 4px;
      }

      kbd {
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 2px 4px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.12);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="logo">CM</div>
        <div class="title-container">
          <h1 class="title">Cap Me Action</h1>
          <p class="subtitle">Operational capture and editor handoff for internal workflows.</p>
        </div>
      </header>

      <main class="main-content">
        <button id="captureToggle" class="capture-btn" type="button">
          <div class="capture-icon">
            <div class="capture-dot" id="captureDot"></div>
          </div>
          <span id="captureToggleLabel">Start Recording</span>
          <p id="captureStatus" class="status-text">Click to start capturing clicks & types</p>
          <div class="keyboard-hints">
            <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd>
          </div>
        </button>

        <div class="actions-grid">
          <button id="openEditor" class="action-btn" type="button">
            <span>Open in Editor</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </button>
          <button id="checkLocalEditor" class="action-btn" type="button">
            <span>Check Local Editor</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"></path><path d="M12 16v6"></path><path d="m4.93 4.93 4.24 4.24"></path><path d="m14.83 14.83 4.24 4.24"></path><path d="M2 12h6"></path><path d="M16 12h6"></path><path d="m4.93 19.07 4.24-4.24"></path><path d="m14.83 9.17 4.24-4.24"></path></svg>
          </button>
          <button id="downloadLastJson" class="action-btn" type="button">
            <span>Download JSON</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
        </div>

        <div class="section-header">
          <h2 class="section-title">Recent Captures</h2>
          <button id="openInspector" class="view-all" type="button">View All</button>
        </div>
        
        <div id="recentCaptureList" class="recent-list">
          <p class="empty-state">Loading captures...</p>
        </div>
      </main>

      <footer class="footer">
        <button id="openInspectorFooter" class="footer-btn" type="button">Settings</button>
        <span class="footer-note">Hosted editor default</span>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
